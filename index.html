<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Love ❤️</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#start-btn {
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    padding:15px 40px; font-size:22px;
    background:#1a2a3a; border:2px solid #88aaff;
    color:white; border-radius:40px; cursor:pointer;
    z-index:100;
}
</style>
</head>

<body>
<button id="start-btn">Зажечь сердце</button>

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.128.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
"tween": "https://unpkg.com/@tweenjs/tween.js@18.6.4/dist/tween.esm.js"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import * as TWEEN from 'tween';

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020210);

// камера
const camera = new THREE.PerspectiveCamera(80, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2.8, 80); // чуть дальше для крупных фото

// рендер
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// BLOOM
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.4, 0.4, 0.85
));

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.target.set(0, 2.8, 0);

// свет
scene.add(new THREE.AmbientLight(0x404040));
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);

// 🌕 ЛУНА с возможностью пульсации
const moonGeom = new THREE.SphereGeometry(4.5, 128, 128);
const moonTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/moon_1024.jpg');
const moonMat = new THREE.MeshPhongMaterial({
    map: moonTex,
    emissive: 0x111111,
    emissiveIntensity: 0.1
});
const moon = new THREE.Mesh(moonGeom, moonMat);
moon.position.set(0, 2.8, 0);
moon.visible = false;
scene.add(moon);

// пульсация луны как бьющееся сердце
function startMoonPulsation() {
    const beatScale = 1.3;
    const normalScale = 1.0;
    const beatDur = 200;
    const releaseDur = 600;
    const pause = 1500;
    const colors = [0xffffff, 0x88aaff, 0xff88aa];
    let colorIndex = 0;

    function beat() {
        // удар
        new TWEEN.Tween(moon.scale)
            .to({ x: beatScale, y: beatScale, z: beatScale }, beatDur)
            .easing(TWEEN.Easing.Quadratic.Out)
            .onComplete(() => {
                // спад
                new TWEEN.Tween(moon.scale)
                    .to({ x: normalScale, y: normalScale, z: normalScale }, releaseDur)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .onComplete(() => {
                        // пауза и смена цвета
                        colorIndex = (colorIndex + 1) % colors.length;
                        new TWEEN.Tween(moon.material.emissive)
                            .to(new THREE.Color(colors[colorIndex]), 300)
                            .start();
                        setTimeout(beat, pause);
                    })
                    .start();
            })
            .start();
    }
    setTimeout(beat, 500);
}

// ⭐ звезды (более реалистичные)
const starsGeom = new THREE.BufferGeometry();
const starCount = 5000;
const pos = new Float32Array(starCount*3);
const colors = new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){
    // распределение в сфере
    const r = 80 + Math.random() * 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);

    // случайный цвет (белый, голубой, желтоватый)
    const t = Math.random();
    if (t < 0.6) colors[i*3] = colors[i*3+1] = colors[i*3+2] = 1; // белый
    else if (t < 0.85) {
        colors[i*3] = 0.7; colors[i*3+1] = 0.8; colors[i*3+2] = 1; // голубой
    } else {
        colors[i*3] = 1; colors[i*3+1] = 0.9; colors[i*3+2] = 0.7; // желтоватый
    }
}

starsGeom.setAttribute('position', new THREE.BufferAttribute(pos,3));
starsGeom.setAttribute('color', new THREE.BufferAttribute(colors,3));

const stars = new THREE.Points(
    starsGeom,
    new THREE.PointsMaterial({ size: 0.4, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending })
);
scene.add(stars);

// 🌫️ ТУМАННОСТИ (две цветные)
function createNebula(color1, color2) {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
    grad.addColorStop(0, color1);
    grad.addColorStop(0.5, color2);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return new THREE.CanvasTexture(canvas);
}

const nebula1 = new THREE.Sprite(
    new THREE.SpriteMaterial({ 
        map: createNebula('rgba(180, 100, 255, 0.2)', 'rgba(80,0,80,0)'),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true
    })
);
nebula1.scale.set(40, 40, 1);
nebula1.position.set(-20, 2, -30);
scene.add(nebula1);

const nebula2 = new THREE.Sprite(
    new THREE.SpriteMaterial({ 
        map: createNebula('rgba(100, 200, 255, 0.2)', 'rgba(0,0,80,0)'),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true
    })
);
nebula2.scale.set(40, 40, 1);
nebula2.position.set(20, 5, -35);
scene.add(nebula2);

// ❤️ сердце позиции (3D с небольшим Z)
function getHeart(count, scale=1){
    const arr=[];
    for(let i=0;i<count;i++){
        const t = (i/count)*Math.PI*2;
        const x = 16 * Math.pow(Math.sin(t),3) * scale;
        const y = (13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)) * scale;
        const z = Math.sin(t * 2) * 2; // небольшая глубина
        arr.push(new THREE.Vector3(x, y, z));
    }
    return arr;
}

// 📸 ФОТОГРАФИИ (имена файлов)
const files = [
    'photo_1.jpg','photo_2.jpg','photo_3.jpg','photo_4.jpg',
    'photo_5.jpg','photo_6.jpg','photo_7.jpg','photo_8.jpg',
    'photo_9.jpg','photo_10.jpg','photo_11.jpg','photo_12.jpg','photo_13.jpg'
];

const group = new THREE.Group();
scene.add(group);

async function show(){
    document.getElementById('start-btn').style.display = 'none';
    moon.visible = true;
    startMoonPulsation();

    const loader = new THREE.TextureLoader();
    const textures=[];

    for(let f of files){
        try{
            textures.push(await loader.loadAsync(f));
        }catch(e){
            console.log("нет файла",f);
        }
    }

    if(textures.length===0) return;

    // генерируем позиции сердца (60 штук для плотности)
    const heart = getHeart(60, 1.5);

    // очищаем группу
    while(group.children.length) group.remove(group.children[0]);

    heart.forEach((p,i)=>{
        const tex = textures[i % textures.length];
        const spr = new THREE.Sprite(
            new THREE.SpriteMaterial({
                map: tex,
                blending: THREE.AdditiveBlending, // можно сменить на NormalBlending для естественных цветов
                transparent: true,
                depthWrite: false
            })
        );

        // РАЗМЕР ФОТО: сейчас 25, можно менять
        spr.scale.set(25, 25, 1);
        // РАДИУС КОНТУРА: множитель 1.2 (чем больше, тем дальше от центра)
        spr.position.copy(p.clone().multiplyScalar(1.2));
        spr.position.y += 2.8; // поднимаем до уровня луны

        group.add(spr);

        // анимация появления (из центра)
        spr.scale.set(0,0,0);
        new TWEEN.Tween({s:0})
            .to({s:1}, 1500)
            .delay(i*30)
            .onUpdate(v=>spr.scale.set(v.s, v.s, 1))
            .start();
    });
}

document.getElementById('start-btn').onclick = show;

// анимация туманностей
function animateNebulas() {
    const time = Date.now() * 0.0005;
    nebula1.position.x = -20 + Math.sin(time) * 5;
    nebula1.position.y = 2 + Math.cos(time*0.6) * 4;
    nebula1.material.opacity = 0.5 + Math.sin(time) * 0.3;

    nebula2.position.x = 20 + Math.cos(time*0.7) * 6;
    nebula2.position.y = 5 + Math.sin(time*0.5) * 5;
    nebula2.material.opacity = 0.5 + Math.cos(time*0.4) * 0.3;
}

// анимация
function animate(){
    requestAnimationFrame(animate);

    if (moon.visible) {
        moon.rotation.y += 0.001;
    }

    // вращение сердца
    group.rotation.y += 0.003;

    // звезды
    stars.rotation.x += 0.0001;
    stars.rotation.y += 0.0002;

    // туманности
    animateNebulas();

    TWEEN.update();
    controls.update();
    composer.render();
}
animate();

onresize=()=>{
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
};
</script>
</body>
</html>
